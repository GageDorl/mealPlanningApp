# See https://docs.powersync.com/sync/advanced/compatibility
config:
  edition: 3

streams:
  global_ingredients:
    # Shared lookup table — same data for all users
    auto_subscribe: true
    queries:
      - SELECT * FROM ingredients

  global_popular:
    # Popular recipes list + the recipe rows they reference (so every user can read them offline)
    auto_subscribe: true
    queries:
      - SELECT * FROM popular_recipes
      - SELECT recipes.* FROM recipes JOIN popular_recipes ON popular_recipes.recipe_id = recipes.id
      - SELECT recipe_ingredients.* FROM recipe_ingredients JOIN popular_recipes ON popular_recipes.recipe_id = recipe_ingredients.recipe_id

  user_data:
    # Per-user data scoped to the authenticated user's id
    auto_subscribe: true
    queries:
      - SELECT * FROM users WHERE id = auth.user_id()
      - SELECT * FROM recipes WHERE user_id = auth.user_id()
      - SELECT * FROM macro_goals WHERE user_id = auth.user_id()
      - SELECT * FROM dietary_preferences WHERE user_id = auth.user_id()
      - SELECT recipe_ingredients.* FROM recipe_ingredients JOIN recipes ON recipes.id = recipe_ingredients.recipe_id WHERE recipes.user_id = auth.user_id()
      - SELECT * FROM meal_plans WHERE user_id = auth.user_id()
      - SELECT meal_slots.* FROM meal_slots JOIN meal_plans ON meal_plans.id = meal_slots.meal_plan_id WHERE meal_plans.user_id = auth.user_id()
      - SELECT * FROM food_logs WHERE user_id = auth.user_id()
      - SELECT food_log_items.* FROM food_log_items JOIN food_logs ON food_logs.id = food_log_items.food_log_id WHERE food_logs.user_id = auth.user_id()
      - SELECT * FROM personal_foods WHERE user_id = auth.user_id()
      - SELECT * FROM pantry_staples WHERE user_id = auth.user_id()
      - SELECT * FROM grocery_lists WHERE user_id = auth.user_id()
      - SELECT grocery_items.* FROM grocery_items JOIN grocery_lists ON grocery_lists.id = grocery_items.grocery_list_id WHERE grocery_lists.user_id = auth.user_id()
      - SELECT meal_slot_recipes.* FROM meal_slot_recipes JOIN meal_slots ON meal_slots.id = meal_slot_recipes.meal_slot_id JOIN meal_plans ON meal_plans.id = meal_slots.meal_plan_id WHERE meal_plans.user_id = auth.user_id()
