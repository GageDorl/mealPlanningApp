name: Deploy — Alpha

on:
  push:
    branches:
      - alpha

jobs:
  deploy:
    name: EAS update (alpha)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mealPlan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mealPlan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update → alpha channel (Android)
        run: eas update --channel alpha --platform android --environment preview --message "${{ github.event.head_commit.message }}"
        env:
          CI: '1'
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_POWERSYNC_URL: ${{ secrets.EXPO_PUBLIC_POWERSYNC_URL }}
          EXPO_PUBLIC_SPOONACULAR_API_KEY: ${{ secrets.EXPO_PUBLIC_SPOONACULAR_API_KEY }}

      - name: Export web
        run: npm run export:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_POWERSYNC_URL: ${{ secrets.EXPO_PUBLIC_POWERSYNC_URL }}
          EXPO_PUBLIC_SPOONACULAR_API_KEY: ${{ secrets.EXPO_PUBLIC_SPOONACULAR_API_KEY }}

      - name: Deploy web → alpha alias
        run: eas deploy --alias alpha
        env:
          CI: '1'
