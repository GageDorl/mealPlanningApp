name: Deploy — Alpha

on:
  push:
    branches:
      - alpha

jobs:
  deploy:
    name: EAS update (alpha)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mealPlan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mealPlan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update → alpha channel (Android)
        run: eas update --channel alpha --platform android --message "${{ github.event.head_commit.message }}" --non-interactive

      - name: Deploy web → alpha alias
        run: eas deploy --alias alpha --non-interactive
